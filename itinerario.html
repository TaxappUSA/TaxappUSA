<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxUSA — Itinerario</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.google.com/recaptcha/api.js?render=6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        const _t = localStorage.getItem('theme');
        if (_t) document.documentElement.setAttribute('data-theme', _t);
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>
<body>

<div class="wrap">
    <div class="app-header">
        <div class="logo">TaxUSA <img src="https://flagcdn.com/w40/us.png" alt="USA"></div>
        <button class="btn-nav-set" id="btnSettings" onclick="toggleSettings()"></button>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="btn-nav"><span class="ni">🏠</span><span data-i18n="nav_home">INICIO</span></a>
        <a href="itinerario.html" class="btn-nav active"><span class="ni">📍</span><span data-i18n="nav_itinerary">ITINERARIO</span></a>
        <a href="compras.html" class="btn-nav"><span class="ni">🛍️</span><span data-i18n="nav_expenses">GASTOS</span></a>
        <a href="unidades.html" class="btn-nav"><span class="ni">⚖️</span><span data-i18n="nav_units">UNIDADES</span></a>
    </nav>

    <div class="card-tip" id="tip-card">
        <div class="tip-content">
            <span class="tip-icon">💡</span>
            <p id="tip-text" data-i18n="loading_tips">Cargando tips...</p>
        </div>
    </div>

    <div class="section-title" style="margin-top: 20px;">
        <h2 data-i18n="title_parks">Tiempos de Espera</h2>
        <select id="city-selector" class="state-select" onchange="renderCityData()">
            <option value="orlando">Orlando (Disney/Universal)</option>
            <option value="california">California (Disney/Universal)</option>
        </select>
    </div>

    <div id="queues-container" class="history-list">
        </div>

</div>

<div class="settings-drawer" id="settingsDrawer">
    <div class="drawer-header">
        <h3 data-i18n="settings_title">Ajustes</h3>
        <button class="close-btn" onclick="toggleSettings()">✕</button>
    </div>
    <div class="drawer-content">
        <div class="user-info-brief">
            <div class="user-avatar" id="drawerAvatar"></div>
            <div class="user-details">
                <p id="userEmail">---</p>
            </div>
        </div>
        <button class="drawer-btn" onclick="toggleTheme()">🌓 <span data-i18n="toggle_theme">Modo Claro/Oscuro</span></button>
        <button class="drawer-btn" onclick="location.href='profiles.html'">👥 <span data-i18n="change_profile">Cambiar Perfil</span></button>
        <button class="drawer-btn logout" onclick="signOut(auth)">🚪 <span data-i18n="logout">Cerrar Sesión</span></button>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // --- CONSTANTE DE TIPS ---
    const tips = {
        es: [
            "Orlando: La mejor hora para filas cortas es durante los fuegos artificiales.",
            "Universal: La fila de Single Rider suele ahorrarte 40 minutos.",
            "NYC: El ferry a Staten Island es gratis y pasa cerca de la Estatua.",
            "Shopping: Jersey Gardens (NJ) no cobra impuestos en ropa y calzado."
        ],
        en: [
            "Orlando: Best time for short lines is during the fireworks show.",
            "Universal: Single Rider lines usually save you 40 minutes.",
            "NYC: Staten Island Ferry is free and passes by the Statue of Liberty.",
            "Shopping: Jersey Gardens (NJ) has no sales tax on clothes."
        ]
    };

    let currentTipIndex = 0;

    window.nextTip = () => {
        const lang = localStorage.getItem('appLang') || 'es';
        currentTipIndex = (currentTipIndex + 1) % tips[lang].length;
        const el = document.getElementById('tip-text');
        if (el) el.innerText = tips[lang][currentTipIndex];
    };

    window.toggleSettings = () => {
        document.getElementById('settingsDrawer').classList.toggle('show');
    };

    // --- LÓGICA DE FILAS (Mantenimiento del flujo de itinerario anterior) ---
    window.renderCityData = async () => {
        const city = document.getElementById('city-selector').value;
        const container = document.getElementById('queues-container');
        container.innerHTML = '<p style="text-align:center; padding:20px;">Cargando tiempos...</p>';

        try {
            // Aquí iría tu llamada a la API de Queue-Times que tenías antes
            // Simulación de carga:
            setTimeout(() => {
                container.innerHTML = `
                    <div class="history-item">
                        <div class="h-info">
                            <p class="h-name">Magic Kingdom 🏰</p>
                            <p class="h-date">Seven Dwarfs Mine Train</p>
                        </div>
                        <div class="h-amount status-open">75 min</div>
                    </div>
                    <div class="history-item">
                        <div class="h-info">
                            <p class="h-name">Universal Studios 🎢</p>
                            <p class="h-date">VelociCoaster</p>
                        </div>
                        <div class="h-amount status-warn">45 min</div>
                    </div>
                `;
            }, 800);
        } catch (e) {
            container.innerHTML = '<p>Error al cargar datos.</p>';
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userEmail').innerText = user.email;
            const perfilFoto = localStorage.getItem('perfilActivoFoto');
            if (perfilFoto) {
                document.getElementById('btnSettings').style.backgroundImage = `url(${perfilFoto})`;
                document.getElementById('drawerAvatar').style.backgroundImage = `url(${perfilFoto})`;
            }
            renderCityData();
        } else {
            window.location.replace("login.html");
        }
    });

    window.onload = () => {
        const lang = localStorage.getItem('appLang') || 'es';
        document.getElementById('tip-text').innerText = tips[lang][0];
        setInterval(window.nextTip, 8000);
    };
</script>

</body>
</html>
