<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Orlando</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #f8fafc; 
            --danger: #ef4444; 
            --female: #db2777;
            --slate: #1e293b;
            --success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .card { 
            background: white; 
            padding: 1.5rem; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            margin-bottom: 15px; 
        }
        h2 { margin: 0 0 1rem 0; color: var(--primary); text-align: center; font-size: 1.3rem; font-weight: 800; }
        
        /* Recuadro Cotización */
        .fx-card {
            background: var(--slate);
            color: white;
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fx-info { text-align: left; }
        .fx-title { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; }
        .fx-value { font-size: 1.2rem; font-weight: 900; color: var(--success); }
        .fx-update { font-size: 0.5rem; color: #64748b; margin-top: 2px; }

        /* Presupuesto */
        .budget-display { 
            background: #eff6ff; 
            padding: 1.2rem; 
            border-radius: 20px; 
            text-align: center; 
            margin-bottom: 1rem; 
            border: 1px dashed var(--primary); 
        }
        .amount { font-size: 2rem; font-weight: 900; color: var(--primary); }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #f1f5f9; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            font-size: 1rem; 
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        .btn-add { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
        }
        
        .history-item { 
            background: white; 
            padding: 12px 15px; 
            border-radius: 16px; 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #e2e8f0; 
            width: 100%;
            max-width: 450px;
        }
        .history-info { font-size: 0.85rem; font-weight: 700; color: #1e293b; }

        /* Talles */
        .gender-header { 
            color: white; padding: 12px; border-radius: 14px; text-align: center; 
            font-weight: 900; margin: 20px 0 10px; font-size: 1rem; 
        }
        .size-section { margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; background: white; }
        .size-title { background: #f8fafc; color: #475569; padding: 10px 15px; font-size: 0.75rem; font-weight: 800; border-bottom: 1px solid #e2e8f0; text-transform: uppercase; }
        .size-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; font-size: 0.85rem; }
        .size-head { font-weight: 800; color: #94a3b8; padding: 8px; font-size: 0.7rem; background: #f1f5f9; }
        .size-row { padding: 10px; border-bottom: 1px solid #f1f5f9; font-weight: 600; }

        .nav-tabs {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; display: flex; border-top: 1px solid #e2e8f0;
            padding: 10px 0; z-index: 100;
        }
        .nav-btn {
            flex: 1; border: none; background: none; font-size: 0.7rem;
            color: #94a3b8; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="fx-card">
        <div class="fx-info">
            <div class="fx-title">Dólar BNA (Oficial)</div>
            <div class="fx-value" id="dolar-val">Cargando...</div>
            <div class="fx-update" id="fx-time">Act: --:--</div>
        </div>
        <div style="font-size: 1.5rem;">🏦</div>
    </div>

    <div id="sec-budget" style="width: 100%; max-width: 450px; padding-bottom: 80px;">
        <div class="card">
            <h2>Shopping Orlando 🇺🇸</h2>
            <div class="budget-display">
                <div style="font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase;">Disponible</div>
                <div class="amount" id="disponible">USD 0.00</div>
            </div>
            
            <label style="font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-left: 5px;">ESTABLECER TOTAL</label>
            <input type="number" id="base-budget" placeholder="Ej: 2000">
            <button class="btn-add" style="background:#64748b; padding:10px; margin-bottom:20px; font-size: 0.8rem;" onclick="setBudget()">ACTUALIZAR FONDO</button>
            
            <hr style="border: 0; border-top: 1px solid #f1f5f9; margin-bottom: 20px;">
            
            <input type="text" id="gasto-nom" placeholder="¿Qué compraste?">
            <input type="number" id="gasto-val" placeholder="Precio Final USD">
            <button class="btn-add" onclick="restarGasto()">REGISTRAR COMPRA</button>
        </div>

        <div id="lista-compras"></div>
        <button onclick="borrarHistorial()" style="width:100%; background:none; border:none; color:var(--danger); font-size:0.7rem; font-weight:800; margin-top:15px; cursor:pointer; text-decoration: underline;">BORRAR TODO EL HISTORIAL</button>
    </div>

    <div id="sec-sizes" class="card" style="display:none; padding: 1.2rem; margin-bottom: 80px;">
        <h2>Guía de Talles 🇺🇸</h2>
        <div class="gender-header" style="background:var(--slate);">HOMBRE / MEN</div>
        <div class="size-section">
            <div class="size-title">Zapatillas</div>
            <div class="size-grid">
                <div class="size-head">AR</div><div class="size-head">US</div><div class="size-head">CM</div>
                <div class="size-row">40</div><div class="size-row">8.0</div><div class="size-row">26.5</div>
                <div class="size-row">41</div><div class="size-row">9.0</div><div class="size-row">27.5</div>
                <div class="size-row">42</div><div class="size-row">10.0</div><div class="size-row">28.5</div>
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-btn" onclick="location.href='index.html'">💵 TAX</button>
        <button class="nav-btn" id="btn-sizes" onclick="showSec('sizes')">📏 TALLES</button>
        <button class="nav-btn active" id="btn-budget" onclick="showSec('budget')">🛒 COMPRAS</button>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('tripBalance')) || 0;
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];

        // --- Lógica de Cotización ---
        async function fetchDolar() {
            try {
                const response = await fetch('https://dolarapi.com/v1/dolares/oficial');
                const data = await response.json();
                const venta = data.venta;
                document.getElementById('dolar-val').innerText = `$ ${venta.toFixed(2)}`;
                const now = new Date();
                document.getElementById('fx-time').innerText = `Act: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            } catch (error) {
                document.getElementById('dolar-val').innerText = "Error API";
            }
        }

        // Actualizar cada 5 minutos (300,000 ms)
        setInterval(fetchDolar, 300000);
        fetchDolar(); // Carga inicial

        // --- Lógica de Presupuesto ---
        function setBudget() {
            const input = document.getElementById('base-budget');
            if(input.value !== "" && !isNaN(input.value)) {
                balance = parseFloat(input.value);
                updateUI();
                input.value = '';
            }
        }

        function restarGasto() {
            const nomInput = document.getElementById('gasto-nom');
            const valInput = document.getElementById('gasto-val');
            const val = parseFloat(valInput.value);
            const nom = nomInput.value.trim() || "Compra";

            if(!isNaN(val) && val > 0) {
                balance -= val;
                history.unshift({ nombre: nom, precio: val });
                updateUI();
                nomInput.value = '';
                valInput.value = '';
            }
        }

        function borrarHistorial() {
            if(confirm("¿Borrar todos los gastos registrados?")) {
                history = [];
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('disponible').innerText = 'USD ' + balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            localStorage.setItem('tripBalance', balance);
            localStorage.setItem('tripHistory', JSON.stringify(history));
            
            const lista = document.getElementById('lista-compras');
            lista.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-info">${item.nombre}</div>
                    <div style="color:var(--danger); font-weight:800;">- USD ${item.precio.toFixed(2)}</div>
                </div>
            `).join('');
        }

        function showSec(sec) {
            document.getElementById('sec-budget').style.display = sec === 'budget' ? 'block' : 'none';
            document.getElementById('sec-sizes').style.display = sec === 'sizes' ? 'block' : 'none';
            document.getElementById('btn-budget').classList.toggle('active', sec === 'budget');
            document.getElementById('btn-sizes').classList.toggle('active', sec === 'sizes');
        }

        updateUI();
    </script>
</body>
</html>
