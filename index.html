<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viaje Orlando 2027</title>
    <style>
        :root { --primary: #7c3aed; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 1.5rem; font-weight: 900; margin: 0; background: linear-gradient(135deg, #7c3aed, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .settings-trigger { background: #f1f5f9; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .menu-card { background: var(--white); padding: 25px 15px; border-radius: 28px; text-align: center; text-decoration: none; color: var(--text); box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: transform 0.2s; border: 1px solid rgba(0,0,0,0.02); }
        .menu-card:active { transform: scale(0.95); }
        .icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
        .label { font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }

        .footer { margin-top: auto; padding: 30px 0; text-align: center; font-size: 0.75rem; color: #94a3b8; font-weight: 600; }
        
        /* Ajustes Drawer */
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 1001; transition: 0.3s; padding: 25px; display: flex; flex-direction: column; }
        .settings-drawer.open { right: 0; }
        .drawer-btn { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer; font-size: 0.85rem; text-align: left; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ORLANDO 2027</h1>
        <button class="settings-trigger" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="grid">
        <a href="itinerario.html" class="menu-card">
            <span class="icon">📍</span>
            <span class="label">Itinerario</span>
        </a>
        <a href="compras.html" class="menu-card">
            <span class="icon">🛍️</span>
            <span class="label">Compras</span>
        </a>
        <a href="documentos.html" class="menu-card">
            <span class="icon">📄</span>
            <span class="label">Documentos</span>
        </a>
        <a href="tips.html" class="menu-card">
            <span class="icon">✨</span>
            <span class="label">Tips</span>
        </a>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleSettings()"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <h3 style="color:var(--primary); margin-top: 0;">Ajustes</h3>
        <p id="userEmail" style="font-size:0.75rem; color:#64748b; margin-bottom:20px; font-weight:700;"></p>
        <button class="drawer-btn" onclick="logout()">Cerrar Sesión</button>
        <button class="drawer-btn" onclick="resetPassword()">Cambiar Contraseña</button>
        <button class="drawer-btn" style="color: #ef4444; border-color: #fecaca;" onclick="deleteAccount()">Eliminar Cuenta</button>
    </div>

    <div class="footer">
        <span>Creado por Juan Cruz Bria <img src="https://flagcdn.com/w40/ar.png" style="width:18px; vertical-align: middle; margin-left: 4px;"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail, deleteUser } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCm0Ig-CPklsjf6j-1uSAeF6I8xtyQKj7U", authDomain: "viajes-db538.firebaseapp.com", projectId: "viajes-db538", storageBucket: "viajes-db538.firebasestorage.app", messagingSenderId: "237311739178", appId: "1:237311739178:web:333e468b184c0402a98a53" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace("login.html");
            } else {
                currentUser = user;
                document.getElementById('userEmail').innerText = user.email;
            }
        });

        window.toggleSettings = () => {
            const d = document.getElementById('settingsDrawer');
            const overlay = document.getElementById('menuOverlay');
            const isOpen = d.classList.toggle('open');
            overlay.style.display = isOpen ? 'block' : 'none';
        };

        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));

        window.resetPassword = () => {
            if (currentUser) {
                sendPasswordResetEmail(auth, currentUser.email)
                    .then(() => alert("Correo de cambio de clave enviado!"))
                    .catch(e => alert("Error: " + e.message));
            }
        };

        window.deleteAccount = () => {
            if(confirm("¿Estás seguro de eliminar tu cuenta? Esta acción no se puede deshacer.")) {
                deleteUser(currentUser)
                    .then(() => window.location.replace("login.html"))
                    .catch(e => alert("Por seguridad, re-inicia sesión antes de eliminar tu cuenta."));
            }
        };
    </script>
</body>
</html>
