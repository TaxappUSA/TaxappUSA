<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inicio - TaxUSA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script src="https://www.google.com/recaptcha/api.js?render=6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw"></script>
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>

    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #f8fafc; 
            --box-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --input-border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --box-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --input-border: #334155;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; transition: 0.3s; }
        .total-card { background: var(--primary); color: white; padding: 25px; border-radius: 24px; text-align: center; margin-bottom: 20px; }
        .tip-box { transition: 0.3s; }
        #tip-content { transition: opacity 0.3s ease-in-out; }
        .lang-opt.active { background: var(--primary) !important; color: white !important; }
        /* Estilos de los drawers y modales omitidos para brevedad, mantener los tuyos */
    </style>
</head>
<body>

    <div class="total-card">
        <h2 id="final-total">USD 0.00</h2>
        <p id="tax-detail">Tax Aplicado: 0%</p>
        <div id="trip-label">Cargando viaje...</div>
        <div id="timer" style="font-size: 0.8rem; opacity: 0.8;">--:--:--</div>
    </div>

    <div class="tip-box" onclick="window.clicManualTip()" style="display: flex; align-items: center; gap: 12px; background: var(--box-bg); padding: 15px; border-radius: 16px; margin: 20px 0; border: 1px solid var(--input-border); cursor: pointer; min-height: 70px;">
        <div style="font-size: 1.5rem;">💡</div>
        <span id="tip-content" style="font-size: 0.85rem; font-weight: 500; color: var(--text-main); line-height: 1.4;">
            Cargando consejos...
        </span>
    </div>

    <div id="settingsDrawer" style="padding: 20px;">
        <label data-i18n="label_language">IDIOMA</label>
        <div class="lang-selector" style="display: flex; background: var(--box-bg); border-radius: 12px; padding: 4px; gap: 4px; border: 1px solid var(--input-border);">
            <button class="lang-opt" id="lang-es" onclick="window.changeLanguage('es')" style="flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://flagcdn.com/w40/es.png" width="20" alt="ES"> ES
            </button>
            <button class="lang-opt" id="lang-en" onclick="window.changeLanguage('en')" style="flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://flagcdn.com/w40/us.png" width="20" alt="US"> EN
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DATA NECESARIA (QUE SE HABÍA BORRADO)
        const taxData = { "Florida": [{n: "Orlando", t: 6.5}, {n: "Miami", t: 7.0}], "New York": [{n: "NYC", t: 8.875}] };
        const translations = {
            es: { label_language: "IDIOMA", label_other: "OTRO", trip_prefix: "Viaje a", days_label: "d", hours_label: "h", minutes_label: "m", seconds_label: "s" },
            en: { label_language: "LANGUAGE", label_other: "OTHER", trip_prefix: "Trip to", days_label: "d", hours_label: "h", minutes_label: "m", seconds_label: "s" }
        };
        const econTips = {
            es: ["Delaware y Oregon tienen 0% de Sales Tax.", "En NYC, ropa menor a $110 no paga tax."],
            en: ["Delaware and Oregon have 0% Sales Tax.", "In NYC, clothing under $110 is tax-free."]
        };

        let tipIndex = 0;
        let timerTips;
        let currentUser = null;
        let tripData = { destination: "Orlando", date: "2027-01-01" };

        window.changeLanguage = (lang) => {
            localStorage.setItem('appLang', lang);
            document.querySelectorAll('.lang-opt').forEach(opt => opt.classList.remove('active'));
            document.getElementById('lang-' + lang)?.classList.add('active');
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });

            const tipElement = document.getElementById('tip-content');
            if (tipElement) tipElement.innerText = econTips[lang][tipIndex];
        };

        window.rotateTip = () => {
            const tipElement = document.getElementById('tip-content');
            const lang = localStorage.getItem('appLang') || 'es';
            tipElement.style.opacity = 0;
            setTimeout(() => {
                tipIndex = (tipIndex + 1) % econTips[lang].length;
                tipElement.innerText = econTips[lang][tipIndex];
                tipElement.style.opacity = 1;
            }, 300);
        };

        window.clicManualTip = () => {
            clearInterval(timerTips);
            window.rotateTip();
            timerTips = setInterval(window.rotateTip, 8000);
        };

        window.onload = () => {
            // Inicializar estados
            const stateSelect = document.getElementById('state-select');
            if(stateSelect) {
                Object.keys(taxData).forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s; opt.text = s;
                    stateSelect.appendChild(opt);
                });
            }
            
            const savedLang = localStorage.getItem('appLang') || 'es';
            window.changeLanguage(savedLang);
            timerTips = setInterval(window.rotateTip, 8000);
            setInterval(updateCountdown, 1000);
        };

        // ... El resto de tus funciones (calculate, loadCities, etc.)
    </script>
</body>
</html>
