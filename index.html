<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inicio - TaxUSA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script src="https://www.google.com/recaptcha/api.js?render=6LeK6cssAAAAALxcJy-95R2nhVMmnuIyB78AQgvw"></script>
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>

    <style>
        /* VARIABLES DINÁMICAS (NUEVO) */
        :root { 
            --primary: #2563eb; 
            --primary-dark: #1d4ed8;
            --bg: #f8fafc; 
            --card: #ffffff; 
            --accent: #7c3aed; 
            --text-main: #1e293b; 
            --text-sub: #64748b;
            --input-border: #e2e8f0;
            --input-bg: #ffffff;
            --box-bg: #f1f5f9;
            --timer-text: #1e3a8a;
            --header-color: #3C3B6E; /* El azul de la bandera USA */
            --error: #ef4444; /* Rojo para el botón close */
            --error-dark: #dc2626;
            --modal-shadow: rgba(0, 0, 0, 0.1) 0px 20px 25px -5px, rgba(0, 0, 0, 0.04) 0px 10px 10px -5px;
        }

        #tip-content {
            transition: opacity 0.3s ease-in-out; /* Velocidad de parpadeo rápida */
            display: inline-block;
            min-height: 1.2em; /* Evita que el contenedor colapse al quedar vacío */
        }

        /* COLORES MODO OSCURO (AÑADIDO) */
        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --input-border: #334155;
            --input-bg: #0f172a;
            --box-bg: #334155;
            --timer-text: #60a5fa;
            --header-color: #ffffff; /* Blanco */
            --error: #f87171; /* Rojo más claro para modo oscuro */
            --error-dark: #ef4444;
            --modal-shadow: rgba(0, 0, 0, 0.5) 0px 20px 25px -5px, rgba(0, 0, 0, 0.3) 0px 10px 10px -5px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background 0.3s ease, color 0.3s ease; color: var(--text-main); padding-bottom: 30px; }
        
        /* Estilos de la Tarjeta Principal */
        .card { background: var(--card); padding: 1.5rem; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; position: relative; transition: background 0.3s ease; margin-bottom: 20px; border: 1px solid var(--input-border); }
        
        h1 { 
            margin: 0 0 1rem 0; 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: var(--header-color);
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            gap: 10px; 
            width: 100%;
            transition: color 0.3s ease;
        }     
        
        /* Barra de Navegación */
        .nav-bar {
            display: flex !important;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            background: var(--box-bg);
            border-radius: 18px;
            padding: 8px 4px;
            margin-bottom: 25px;
            border: 1px solid var(--input-border);
        }

        .btn-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 9px;
            font-weight: 800;
            gap: 3px;
        }

        .btn-nav span:first-child {
            font-size: 18px;
        }

        .btn-nav:active {
            opacity: 0.6;
        }

        .settings-trigger-bar {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            flex: 0 0 auto;
            padding: 0 10px;
            color: var(--text-main);
        }

        /* Countdown Box */
        .countdown-box { background: var(--box-bg); padding: 12px; border-radius: 16px; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 2px; cursor: pointer; position: relative; border: 2px solid transparent; transition: 0.2s; text-align: left; }
        .countdown-box:active { transform: scale(0.98); border-color: var(--primary); }
        .countdown-label { font-size: 0.6rem; font-weight: 800; color: var(--text-sub); text-transform: uppercase; }
        #timer { font-size: 1.1rem; font-weight: 900; color: var(--timer-text); letter-spacing: 0.5px; }
        .edit-hint { position: absolute; top: 5px; right: 8px; font-size: 0.7rem; opacity: 0.5; }

        /* Inputs y Labels */
        .input-group { margin-bottom: 1rem; text-align: left; width: 100%; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-sub); margin-bottom: 0.4rem; text-transform: uppercase; margin-left: 5px; }
        
        input, select { width: 100%; padding: 14px; border: 2px solid var(--input-border); border-radius: 14px; font-size: 0.9rem; outline: none; background: var(--input-bg); color: var(--text-main); font-weight: 600; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); }

        /* Categorías y Propinas (Grids) */
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.2rem; width: 100%; }
        .cat-btn { padding: 15px 10px; border: 2px solid var(--input-border); border-radius: 16px; background: var(--input-bg); font-size: 0.7rem; font-weight: 800; color: var(--text-sub); cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .cat-btn.active { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
        [data-theme="dark"] .cat-btn.active { background: #1e3a8a; border-color: var(--primary); color: white; }

        .tip-section { margin-bottom: 1.2rem; text-align: left; width: 100%; }
        .tip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
        .tip-btn { padding: 10px 2px; border: 2px solid var(--input-border); border-radius: 12px; background: var(--input-bg); font-size: 0.7rem; font-weight: 800; color: var(--text-sub); cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .tip-btn span { font-size: 0.55rem; font-weight: 600; opacity: 0.8; }
        .tip-btn.active { border-color: var(--accent); background: #f5f3ff; color: var(--accent); }
        [data-theme="dark"] .tip-btn.active { background: #4c1d95; color: white; }

        .custom-tip-container { display: flex; flex-direction: column; align-items: center; background: var(--box-bg); border-radius: 14px; padding: 8px 12px; border: 2px solid transparent; transition: 0.2s; }
        .custom-tip-container:focus-within { border-color: var(--accent); }
        .custom-tip-header { display: flex; align-items: center; justify-content: center; width: 100%; gap: 5px; }
        .custom-tip-header span { font-weight: 800; color: var(--text-sub); font-size: 0.7rem; }
        #custom-tip-input { background: transparent; border: none; padding: 0; text-align: center; font-size: 0.8rem; color: var(--accent); width: 40px; font-weight: 800; outline: none; }
        #val-tip-custom { font-size: 0.55rem; font-weight: 600; color: var(--accent); opacity: 0.8; margin-top: 2px; }
        
        /* Cuadros de Resultados */
        .result-box { background: rgba(37, 99, 235, 0.1); padding: 1.2rem; border-radius: 20px; margin-top: 0.8rem; border: 2px dashed var(--primary); margin-bottom: 10px; width: 100%; }
        .result-value { font-size: 2fr; font-weight: 900; color: var(--primary); margin: 2px 0; }
        #tax-detail { font-size: 0.8rem; color: var(--primary); font-weight: bold; }

        .final-box { background: var(--primary); padding: 1.2rem; border-radius: 20px; color: white; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(37,99,235,0.2); width: 100%; }
        .final-value { font-size: 2.2rem; font-weight: 900; margin: 4px 0; }

        /* Tip Dinámico */
        #dynamic-tip { background: rgba(34, 197, 94, 0.1); padding: 10px; border-radius: 12px; font-size: 0.75rem; color: #166534; font-weight: 700; margin-bottom: 15px; border: 1px solid rgba(34, 197, 94, 0.3); width: 100%; }
        [data-theme="dark"] #dynamic-tip { color: #4ade80; border-color: #064e3b; }

        /* Footer y Créditos */
        .footer { margin-top: 10px; text-align: center; font-size: 0.75rem; color: var(--text-sub); font-weight: 600; }
        .api-credits { font-size: 0.55rem; color: var(--text-sub); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px; text-align: center; font-weight: 500; opacity: 0.6; width: 100%; }

        /* =========================================
           NUEVOS ESTILOS DEL MODAL (AESTHETIC) 
           ========================================= */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); /* Fondo un poco más claro */
            z-index: 2000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            backdrop-filter: blur(8px); /* Desenfoque más "aesthetic" */
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.3s ease;
        }
        
        .modal-content { 
            background: var(--card); 
            padding: 30px; /* Más aire interno */
            border-radius: 28px; /* Esquinas más suaves */
            width: 100%; 
            max-width: 380px; /* Un poco más ancho */
            color: var(--text-main); 
            box-shadow: var(--modal-shadow); /* Sombra profunda */
            border: 1px solid var(--input-border); /* Borde sutil */
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal.open {
            display: flex;
            opacity: 1;
        }

        .modal.open .modal-content {
            transform: scale(1);
        }
        
        .modal-title {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            width: 100%;
            text-align: left;
        }

        /* Estilos específicos para inputs dentro del modal */
        .modal-content input {
            background: var(--bg); /* Fondo ligeramente diferente para los inputs del modal */
        }

        /* Contenedor para separar los botones */
        .modal-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px; /* Espacio entre botones */
            margin-top: 10px;
        }

        /* ESTILO DE BOTONES MODERNOS (AESTHETIC) */
        .btn-modal {
            width: 100%;
            padding: 16px;
            border-radius: 18px; /* Muy redondeados */
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-modal:active {
            transform: scale(0.97);
        }

        /* Botón SAVE (Azul Primary) */
        .btn-save {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-save:hover {
            background: var(--primary-dark);
        }

        /* Botón CLOSE (Rojo Error) */
        .btn-close {
            background: var(--error);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .btn-close:hover {
            background: var(--error-dark);
        }

        /* =========================================
           FIN NUEVOS ESTILOS DEL MODAL
           ========================================= */

        /* Estilos del Drawer de Ajustes y Overlay */
        .settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card); z-index: 1001; transition: 0.3s; padding: 25px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); color: var(--text-main); border-left: 1px solid var(--input-border); }
        .settings-drawer.open { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; backdrop-filter: blur(2px); }
        
        .drawer-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--input-border); background: var(--input-bg); cursor: pointer; font-weight: 700; margin-bottom: 10px; font-size: 0.8rem; text-align: left; color: var(--text-main); transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .drawer-btn:active { background: var(--box-bg); }
        .btn-danger { color: #ef4444; border-color: #fecaca; background: rgba(239, 68, 68, 0.05); }
        .btn-danger:active { background: rgba(239, 68, 68, 0.1); }

        .lang-opt.active { 
            background: var(--primary) !important; 
            color: white !important; 
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2); 
        }

    </style>
</head>
<body>

    <div class="card">
        <h1>TaxUSA <img src="https://flagcdn.com/w40/us.png" style="width: 28px; border-radius: 3px;" alt="USA"></h1>
        
        <div class="nav-bar">
            <a href="compras.html" class="btn-nav">
                <span>🛍️</span>
                <span data-i18n="nav_expenses">GASTOS</span>
            </a>
            <a href="itinerario.html" class="btn-nav">
                <span>📍</span>
                <span data-i18n="nav_itinerary">ITINERARIO</span>
            </a>
            <a href="javascript:void(0)" class="btn-nav" onclick="avisoProximamente(event)">
                <span>🔍</span>
                <span data-i18n="nav_compare">COMPARADOR</span>
            </a>
            <a href="unidades.html" class="btn-nav">
                <span>⚖️</span>
                <span data-i18n="nav_units">UNIDADES</span>
            </a>
            <button class="settings-trigger-bar" onclick="toggleSettings()">⚙️</button>
        </div>
        
        <div class="countdown-box" id="box-trip" onclick="openTripModal()">
            <span class="edit-hint">✏️</span>
            <span class="countdown-label" id="trip-label" data-i18n="loading">Cargando viaje...</span>
            <span id="timer">00d 00h 00m 00s</span>
        </div>
        
        <div class="input-group">
            <label data-i18n="label_price">Precio en Etiqueta (USD)</label>
            <input type="number" id="price" placeholder="0.00" oninput="calculate()" step="0.01" inputmode="decimal">
        </div>

        <label data-i18n="label_category">Categoría</label>
        <div class="category-grid">
            <button class="cat-btn active" id="btn-general" onclick="setCategory('general')">🛍️ <span data-i18n="cat_general">GENERAL</span></button>
            <button class="cat-btn" id="btn-tech" onclick="setCategory('tech')">💻 <span data-i18n="cat_tech">TECH</span></button>
            <button class="cat-btn" id="btn-food" onclick="setCategory('food')">🍎 <span data-i18n="cat_food">COMIDA</span></button>
            <button class="cat-btn" id="btn-med" onclick="setCategory('med')">💊 <span data-i18n="cat_med">MEDICINA</span></button>
        </div>

        <div class="input-group">
            <label data-i18n="label_state">Estado</label>
            <select id="state-select" onchange="loadCities()"></select>
        </div>

        <div class="input-group">
            <label data-i18n="label_city">Ciudad / Condado</label>
            <select id="city-select" onchange="calculate()"></select>
        </div>

        <div class="result-box">
            <div class="result-value" id="total-with-tax">USD 0.00</div>
            <div id="tax-detail" data-i18n="tax_applied_label">Tax Aplicado: 0%</div>
        </div>

        <div class="tip-section">
            <label data-i18n="label_tip">Propina (Tip)</label>
            <div class="tip-grid">
                <button class="tip-btn" id="tip-0" onclick="setTip(0)">0% <span id="val-tip-0">$0.00</span></button>
                <button class="tip-btn" id="tip-10" onclick="setTip(10)">10% <span id="val-tip-10">$0.00</span></button>
                <button class="tip-btn active" id="tip-15" onclick="setTip(15)">15% <span id="val-tip-15">$0.00</span></button>
                <button class="tip-btn" id="tip-20" onclick="setTip(20)">20% <span id="val-tip-20">$0.00</span></button>
            </div>
            
            <div class="custom-tip-container">
                <div class="custom-tip-header">
                    <span data-i18n="label_other">OTRO</span> <input type="number" id="custom-tip-input" placeholder="0" oninput="setCustomTip()" inputmode="numeric">
                    <span>%</span>
                </div>
                <span id="val-tip-custom">$0.00</span>
            </div>
        </div>

        <div class="final-box">
            <label style="color: rgba(255,255,255,0.8); margin: 0;" data-i18n="label_total">TOTAL FINAL (INC. TIP)</label>
            <div class="final-value" id="final-total">USD 0.00</div>
        </div>

        <div id="dynamic-tip" class="info-box" onclick="window.clicManualConsejo()" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 1.2rem;">💡</span>
            <span id="tip-content" style="transition: opacity 0.3s ease; font-weight: 500;" data-i18n="loading_tips">
                Cargando consejos...
            </span>
        </div>
    </div>

    <div class="api-credits">
        <span data-i18n="api_used">APIs USADAS</span>: Firebase • FlagCDN • Google Auth • reCAPTCHA v3
    </div>
    <div class="footer">
        <span data-i18n="footer_by">Creado por Juan Cruz Bria</span> <img src="https://flagcdn.com/w40/ar.png" style="width:18px;" alt="Argentina">
    </div>

    <div id="tripModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title" data-i18n="modal_trip_title">Mi Viaje</h3>
            
            <div class="input-group">
                <label data-i18n="modal_city_label">¿A qué ciudad vas?</label>
                <input type="text" id="input-destination" placeholder="Ej: Orlando">
            </div>
            
            <div class="input-group">
                <label data-i18n="modal_date_label">Fecha del viaje</label>
                <input type="date" id="input-date">
            </div>
            
            <div class="modal-actions">
                <button class="btn-modal btn-save" onclick="saveTripSettings()">
                    <span>💾</span> <span data-i18n="btn_save">GUARDAR</span>
                </button>
                <button class="btn-modal btn-close" onclick="closeTripModal()">
                    <span>❌</span> <span data-i18n="btn_close">Cerrar</span>
                </button>
            </div>
        </div>
    </div>
    <div id="menuOverlay" class="menu-overlay" onclick="toggleSettings()"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <h3 style="margin-top:0; color: var(--primary);" data-i18n="settings_title">Ajustes</h3>
        <p id="userEmail" style="font-size:0.75rem; color:var(--text-sub); margin-bottom:20px; font-weight:700;"></p>

        <label data-i18n="label_language">Idioma</label>
        <div class="lang-selector" style="display: flex; background: var(--box-bg); border-radius: 12px; padding: 4px; margin-bottom: 20px; gap: 4px; border: 1px solid var(--input-border);">
            <button class="lang-opt" id="lang-es" onclick="window.changeLanguage('es')" style="flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-size: 0.75rem; font-weight: 800; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://flagcdn.com/w40/es.png" width="20" style="border-radius: 2px;" alt="ES"> ES
            </button>
            <button class="lang-opt" id="lang-en" onclick="window.changeLanguage('en')" style="flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-size: 0.75rem; font-weight: 800; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://flagcdn.com/w40/us.png" width="20" style="border-radius: 2px;" alt="US"> EN
            </button>
        </div>

        <button class="drawer-btn" onclick="changeProfile()">👤 <span data-i18n="btn_change_profile">Cambiar de Perfil</span></button>
        <button class="drawer-btn" onclick="toggleDarkMode()">🌓 <span data-i18n="btn_theme">Cambiar Tema</span></button>
        <button class="drawer-btn" onclick="logout()">🚪 <span data-i18n="btn_logout">Cerrar Sesión</span></button>
        
        <div style="margin-top: auto; padding-top: 20px;">
            <button class="drawer-btn btn-danger" onclick="deleteAccount()">🗑️ <span data-i18n="btn_delete">Eliminar Cuenta</span></button>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Configuración de Firebase (reemplaza con tus credenciales)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        const perfilId = localStorage.getItem('perfilActivoId');
        let tripData = { destination: "Orlando", date: "2027-01-01" };
        let currentTipPercentage = 15;

        // --- DATOS Y TRADUCCIONES ---
        const taxData = {
            "Florida": [{n:"Orlando", t:6.50}, {n:"Miami", t:7.00}, {n:"Tampa", t:8.50}],
            "New York": [{n:"NYC", t:8.88}, {n:"Buffalo", t:8.75}],
            "California": [{n:"Los Angeles", t:9.5}, {n:"San Francisco", t:8.63}]
            // Agrega más datos aquí...
        };

        const translations = {
            es: {
                nav_expenses: "GASTOS", nav_itinerary: "ITINERARIO", nav_compare: "COMPARAR", nav_units: "UNIDADES",
                label_price: "Precio en Etiqueta (USD)", label_category: "Categoría", cat_general: "GENERAL", cat_tech: "TECH", cat_food: "COMIDA", cat_med: "MEDICINA",
                label_state: "Estado", label_city: "Ciudad / Condado", tax_applied_label: "Tax Aplicado", label_tip: "Propina (Tip)", label_total: "TOTAL FINAL (INC. TIP)",
                settings_title: "Ajustes", label_language: "Idioma", btn_change_profile: "Cambiar Perfil",
                btn_theme: "Cambiar Tema", btn_logout: "Cerrar Sesión", btn_delete: "Eliminar Cuenta",
                modal_trip_title: "Mi Viaje", modal_city_label: "¿A qué ciudad vas?", modal_date_label: "Fecha del viaje",
                btn_save: "GUARDAR", btn_close: "Cerrar", loading: "Cargando viaje...", loading_tips: "Cargando tip económico...", footer_by: "Creado por Juan Cruz Bria",
                api_used: "APIs USADAS", days_label: "d", hours_label: "h", minutes_label: "m", seconds_label: "s", trip_prefix: "Faltan para", label_other: "OTRO"
            },
            en: {
                nav_expenses: "EXPENSES", nav_itinerary: "ITINERARY", nav_compare: "COMPARE", nav_units: "UNITS",
                label_price: "Pre-tax price (USD)", label_category: "Category", cat_general: "GENERAL", cat_tech: "TECH", cat_food: "FOOD", cat_med: "MEDICINE",
                label_state: "State", label_city: "City / County", tax_applied_label: "Applied Tax", label_tip: "Tip", label_total: "FINAL PRICE (TIP INC.)",
                settings_title: "Settings", label_language: "Language", btn_change_profile: "Change Profile",
                btn_theme: "Toggle Theme", btn_logout: "Logout", btn_delete: "Delete Account",
                modal_trip_title: "My Trip", modal_city_label: "Where are you going?", modal_date_label: "Trip Date",
                btn_save: "SAVE", btn_close: "Close", loading: "Loading trip...", loading_tips: "Loading economic tip...",  footer_by: "Created by Juan Cruz Bria",
                api_used: "APIS USED", days_label: "d", hours_label: "h", minutes_label: "m", seconds_label: "s", trip_prefix: "Days until", label_other: "OTHER"
            }
        };

        const econTips = {
            es: [
                "Delaware y Oregon tienen 0% de Sales Tax. Ideal para comprar Apple o lujo.",
                "En NYC, la ropa y calzado de menos de $110 están exentos de tax municipal.",
                "New Jersey tiene 0% de tax en ropa. Ideal si vas al Jersey Gardens desde NY."
            ],
            en: [
                "Delaware and Oregon have 0% Sales Tax. Ideal for Apple products or luxury items.",
                "In NYC, clothing and footwear under $110 are exempt from local sales tax.",
                "New Jersey has 0% tax on clothing. Perfect if you visit Jersey Gardens from NY."
            ]
        };

        // --- VARIABLES DE ESTADO DE TIPS ---
        let tipIndex = 0;
        let timerTips;

        // --- AUTENTICACIÓN Y CARGA DE DATOS ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userEmail').innerText = user.email;
                if (!perfilId) { window.location.replace("profiles.html"); return; }
                
                try {
                    const profileRef = doc(db, "usuarios", user.uid, "perfiles", perfilId);
                    const snap = await getDoc(profileRef);
                    if (snap.exists() && snap.data().trip) {
                        tripData = snap.data().trip;
                    }
                    updateTripUI();
                } catch (e) { console.error("Error cargando perfil:", e); }
            } else { window.location.replace("login.html"); }
        });

        // --- FUNCIONES DE CONSEJOS (TIPS) ---
        window.cambiarConsejo = () => {
            const pConsejo = document.getElementById('tip-content');
            const lang = localStorage.getItem('appLang') || 'es';
            const lista = econTips[lang];
            
            if (pConsejo && lista) {
                pConsejo.style.opacity = 0;
                setTimeout(() => {
                    tipIndex = (tipIndex + 1) % lista.length;
                    pConsejo.innerText = lista[tipIndex];
                    pConsejo.style.opacity = 1;
                }, 300);
            }
        };

        window.clicManualConsejo = () => {
            clearInterval(timerTips); 
            window.cambiarConsejo();      
            timerTips = setInterval(window.cambiarConsejo, 8000); 
        };

        // --- CALCULADORA ---
        window.calculate = () => {
            const price = parseFloat(document.getElementById('price').value) || 0;
            let tax = parseFloat(document.getElementById('city-select').value) || 0;
            const categoryBtn = document.querySelector('.cat-btn.active');
            
            if (categoryBtn && (categoryBtn.id === 'btn-med' || categoryBtn.id === 'btn-food')) tax = 0;
            
            const subtotal = price + (price * (tax / 100));
            
            [0, 10, 15, 20].forEach(p => {
                const amount = subtotal * (p / 100);
                const el = document.getElementById(`val-tip-${p}`);
                if(el) el.innerText = `$${amount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            });

            const customVal = parseFloat(document.getElementById('custom-tip-input').value) || 0;
            const customAmount = subtotal * (customVal / 100);
            document.getElementById('val-tip-custom').innerText = `$${customAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            const tipAmount = subtotal * (currentTipPercentage / 100);
            const finalTotal = subtotal + tipAmount;

            document.getElementById('total-with-tax').innerText = 'USD ' + subtotal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('tax-detail').innerText = `${translations[localStorage.getItem('appLang') || 'es'].tax_applied_label}: ${tax}%`;
            document.getElementById('final-total').innerText = 'USD ' + finalTotal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        };

        window.setCategory = (cat) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            window.calculate();
        };

        window.setTip = (percent) => {
            currentTipPercentage = percent;
            document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tip-' + percent).classList.add('active');
            document.getElementById('custom-tip-input').value = "";
            window.calculate();
        };

        window.setCustomTip = () => {
            const val = parseFloat(document.getElementById('custom-tip-input').value);
            if (!isNaN(val)) {
                currentTipPercentage = val;
                document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
            } else { currentTipPercentage = 0; }
            window.calculate();
        };

        // --- CIUDADES Y ESTADOS ---
        window.loadCities = () => {
            const state = document.getElementById('state-select').value;
            const citySelect = document.getElementById('city-select');
            citySelect.innerHTML = "";
            if(taxData[state]) {
                taxData[state].forEach(city => {
                    let opt = document.createElement('option');
                    opt.value = city.t; opt.text = `${city.n} (${city.t}%)`;
                    citySelect.appendChild(opt);
                });
            }
            window.calculate();
        };

        // --- GESTIÓN DEL VIAJE (MODAL) ---
        window.openTripModal = () => {
            const modal = document.getElementById('tripModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('open'), 10);
            document.getElementById('input-destination').value = tripData.destination;
            document.getElementById('input-date').value = tripData.date;
        };

        window.closeTripModal = () => {
            const modal = document.getElementById('tripModal');
            modal.classList.remove('open');
            setTimeout(() => modal.style.display = 'none', 300);
        };

        window.saveTripSettings = async () => {
            const destination = document.getElementById('input-destination').value || "Orlando";
            const date = document.getElementById('input-date').value || "2027-01-01";
            tripData = { destination, date };

            if (currentUser && perfilId) {
                try {
                    const profileRef = doc(db, "usuarios", currentUser.uid, "perfiles", perfilId);
                    await setDoc(profileRef, { trip: tripData }, { merge: true });
                    updateTripUI();
                    window.closeTripModal();
                } catch (e) { alert("Error al guardar: " + e.message); }
            }
        };

        function updateTripUI() {
            const lang = localStorage.getItem('appLang') || 'es';
            const prefix = translations[lang].trip_prefix;
            document.getElementById('trip-label').innerText = `${prefix} ${tripData.destination} ✈️`;
        }

        function updateCountdown() {
            if (!tripData.date) return;
            const target = new Date(tripData.date + "T00:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const timerEl = document.getElementById("timer");
            const lang = localStorage.getItem('appLang') || 'es';
            const t = translations[lang];

            if (diff <= 0) { 
                timerEl.innerText = lang === 'es' ? "¡Buen viaje! ✈️" : "Safe travels! ✈️"; 
                return; 
            }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            timerEl.innerText = `${d}${t.days_label} ${h}${t.hours_label} ${m}${t.minutes_label} ${s}${t.seconds_label}`;
        }

        // --- IDIOMA Y TRADUCCIÓN ---
        window.changeLanguage = (lang) => {
            localStorage.setItem('appLang', lang);
            document.querySelectorAll('.lang-opt').forEach(opt => opt.classList.remove('active'));
            document.getElementById('lang-' + lang)?.classList.add('active');
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
            });

            // Actualizar tip actual
            const pConsejo = document.getElementById('tip-content');
            if (pConsejo && econTips[lang]) {
                pConsejo.innerText = econTips[lang][tipIndex];
            }

            window.calculate();
            updateTripUI();
        };

        // --- AJUSTES Y UI ---
        window.toggleSettings = () => {
            const d = document.getElementById('settingsDrawer');
            const overlay = document.getElementById('menuOverlay');
            const isOpen = d.classList.toggle('open');
            overlay.style.display = isOpen ? 'block' : 'none';
        };

        window.changeProfile = () => {
            localStorage.removeItem('perfilActivoId');
            window.location.href = "profiles.html";
        };

        window.toggleDarkMode = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        };

        window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));

        window.deleteAccount = async () => {
            if (confirm("¿ESTÁS SEGURO? Esta acción eliminará todos tus datos.")) {
                try {
                    await deleteDoc(doc(db, "usuarios", currentUser.uid));
                    await deleteUser(currentUser);
                    window.location.replace("login.html");
                } catch (e) { alert("Error: Re-autenticación necesaria."); logout(); }
            }
        };

        window.avisoProximamente = (e) => {
            e.preventDefault();
            alert(translations[localStorage.getItem('appLang') || 'es'].soon);
        };

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            // Cargar Estados
            const stateSelect = document.getElementById('state-select');
            Object.keys(taxData).sort().forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.text = s;
                if(s === "Florida") opt.selected = true;
                stateSelect.appendChild(opt);
            });

            window.loadCities();
            setInterval(updateCountdown, 1000);

            // Aplicar tema guardado
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // Aplicar idioma y primer tip
            const savedLang = localStorage.getItem('appLang') || 'es';
            window.changeLanguage(savedLang);

            // Iniciar rotación automática de tips
            timerTips = setInterval(window.cambiarConsejo, 8000);
        };
    </script>
</body> 
</html>
