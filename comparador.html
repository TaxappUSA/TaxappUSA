        if (_t) document.documentElement.setAttribute('data-theme', _t);
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme','dark');

    <style>
        :root {
            --primary:#2563eb; --primary-dim:rgba(37,99,235,0.1);
            --accent:#7c3aed; --accent-dim:rgba(124,58,237,0.1);
            --danger:#ef4444; --success:#10b981; --warn:#f59e0b;
            --bg:#f1f5f9; --surface:#ffffff; --surface-2:#f8fafc;
            --border:#e2e8f0; --input-bg:#f8fafc;
            --text:#0f172a; --text-sub:#64748b; --text-dim:#94a3b8;
            --header-color:#1e3a8a;
            --radius:20px; --radius-sm:12px;
            --shadow:0 4px 20px rgba(0,0,0,0.06); --shadow-lg:0 12px 40px rgba(0,0,0,0.1);
            --tr:all 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        [data-theme="dark"] {
            --bg:#0f172a; --surface:#1e293b; --surface-2:#273549;
            --border:#334155; --input-bg:#273549;
            --text:#f1f5f9; --text-sub:#94a3b8; --text-dim:#64748b;
            --header-color:#2563eb;
            --shadow:0 4px 20px rgba(0,0,0,0.3); --shadow-lg:0 12px 40px rgba(0,0,0,0.4);
        }
        *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 40px;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;}
        .wrap{width:100%;max-width:460px;}
        .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
        .logo{display:flex;align-items:center;gap:10px;font-size:1.4rem;font-weight:900;color:var(--header-color);letter-spacing:-0.5px;}
        .logo svg{width:28px;height:28px;flex-shrink:0;}
        .nav-bar{display:flex;align-items:center;background:var(--surface);border-radius:16px;padding:6px;margin-bottom:22px;border:1px solid var(--border);box-shadow:var(--shadow);gap:2px;}
        .btn-nav{flex:1;display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--text-sub);font-size:8px;font-weight:700;gap:2px;padding:6px 2px;border-radius:10px;background:none;border:none;cursor:pointer;transition:var(--tr);text-transform:uppercase;letter-spacing:.3px;}
        .btn-nav .ni{font-size:17px;line-height:1;}
        .btn-nav:hover,.btn-nav.active{color:var(--primary);background:var(--primary-dim);}
        .btn-nav-set{width:34px;height:34px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;overflow:hidden;transition:var(--tr);background-size:cover;background-position:center;}
        .btn-nav-set:hover{border-color:var(--primary);}
        .card{background:var(--surface);border-radius:var(--radius);padding:20px;width:100%;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:14px;position:relative;}
        .slabel{font-size:.6rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:block;}
        input,select{width:100%;padding:14px 16px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.9rem;font-weight:600;outline:none;transition:var(--tr);-webkit-appearance:none;}
        input:focus,select:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-dim);}
        input::placeholder{color:var(--text-dim);font-weight:500;}

        /* Buscador */
        .search-wrap{position:relative;margin-bottom:14px;}
        .search-input{width:100%;padding:15px 50px 15px 18px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.95rem;font-weight:600;outline:none;transition:var(--tr);-webkit-appearance:none;}
        .search-input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-dim);}
        .search-input::placeholder{color:var(--text-dim);font-weight:500;}
        .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}

        /* Categorías */
        .cat-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
        .cat-btn{padding:10px 6px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--input-bg);color:var(--text-sub);font-family:inherit;font-size:.72rem;font-weight:800;cursor:pointer;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}
        .cat-btn .cat-icon{font-size:1.4rem;line-height:1;}
        .cat-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}
        .cat-btn.active{border-color:var(--primary);background:var(--primary);color:white;}

        .btn{width:100%;padding:15px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:.85rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn:active{transform:scale(.97);}
        .btn-primary{background:var(--primary);color:white;box-shadow:0 4px 14px rgba(37,99,235,.3);}
        .btn-primary:hover{background:#1d4ed8;}
        .btn-ghost{background:transparent;color:var(--text-sub);border:1.5px solid var(--border);}

        /* Resultado */
        .ai-result{display:none;}
        .ai-result.show{display:block;animation:fadeIn .3s ease;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        .tip-box{background:var(--primary-dim);border:1.5px solid var(--primary);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;}
        .tip-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
        .tip-label{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--primary);margin-bottom:3px;}
        .tip-text{font-size:.8rem;font-weight:600;color:var(--text);line-height:1.4;}

        .stores-grid{display:flex;flex-direction:column;gap:10px;}
        .store-item{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;text-decoration:none;transition:var(--tr);}
        .store-item:hover{border-color:var(--primary);background:var(--primary-dim);transform:translateX(3px);}
        .store-left{display:flex;align-items:center;gap:12px;}
        .store-logo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
        .store-name{font-weight:800;font-size:.9rem;color:var(--text);}
        .store-tag{font-size:.7rem;color:var(--text-sub);font-weight:600;margin-top:2px;}
        .store-arrow{color:var(--text-dim);font-size:1rem;flex-shrink:0;}

        .app-footer{margin-top:8px;padding:12px 0;text-align:center;font-size:.7rem;color:var(--text-dim);font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;}
        .app-footer img{width:16px;border-radius:2px;}

        /* Settings drawer */
        .menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:1000;backdrop-filter:blur(4px);}
        .settings-drawer{position:fixed;top:0;right:-300px;width:290px;height:100%;background:var(--surface);z-index:1001;transition:.3s ease;padding:28px 20px;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.15);border-left:1px solid var(--border);overflow-y:auto;}
        .settings-drawer.open{right:0;}
        .drawer-header{font-size:1.1rem;font-weight:900;color:var(--primary);margin-bottom:4px;}
        .drawer-email{font-size:.75rem;color:var(--text-dim);font-weight:600;margin-bottom:20px;}
        .drawer-section-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px;display:block;}
        .lang-selector{display:flex;background:var(--input-bg);border-radius:var(--radius-sm);padding:4px;gap:4px;margin-bottom:14px;border:1.5px solid var(--border);}
        .lang-opt{flex:1;padding:8px 4px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:.75rem;font-weight:800;color:var(--text-sub);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:var(--tr);}
        .lang-opt img{width:18px;border-radius:2px;}
        .lang-opt.active{background:var(--primary);color:white;}
        .drawer-btn{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);cursor:pointer;font-weight:700;margin-bottom:8px;font-size:.85rem;text-align:left;font-family:inherit;transition:var(--tr);display:flex;align-items:center;gap:10px;}
        .drawer-btn:hover{background:var(--surface-2);border-color:var(--primary);}
        .btn-danger{color:var(--danger)!important;border-color:rgba(239,68,68,.3)!important;}
    </style>
</head>

        { name:'Amazon',          emoji:'📦', color:'#FF9900', tag_es:'Gran variedad de marcas',         tag_en:'Wide brand selection',            url: q=>`https://www.amazon.com/s?k=${encodeURIComponent(q)}` },
        { name:'Google Shopping', emoji:'🛍️', color:'#4285F4', tag_es:'Comparar todos los precios',     tag_en:'Compare all prices',              url: q=>`https://www.google.com/search?tbm=shop&q=${encodeURIComponent(q)}` },
    ]
};

// ── CATEGORÍA ─────────────────────────────────────────
let currentCat = 'general';
window.selectCat = (el) => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentCat = el.dataset.cat;
};

// ── BUSCAR ────────────────────────────────────────────
window.buscar = () => {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) { alert(currentLang === 'es' ? 'Escribí el nombre del producto para buscar.' : 'Type a product name to search.'); return; }

    const stores = STORES[currentCat];
    const grid = document.getElementById('storesGrid');
    grid.innerHTML = '';

    stores.forEach(store => {
        const a = document.createElement('a');
        a.href = store.url(query);
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'store-item';
        const tag = currentLang === 'en' ? store.tag_en : store.tag_es;
        a.innerHTML = `
            <div class="store-left">
                <div class="store-logo" style="background:${store.color}22;">${store.emoji}</div>
                <div>
                    <div class="store-name">${store.name}</div>
                    <div class="store-tag">${tag}</div>
                </div>
            </div>
            <span class="store-arrow">→</span>
        `;
        grid.appendChild(a);
    });

    document.getElementById('tipText').textContent = i18n[currentLang]['tip_' + currentCat];
    document.getElementById('storesLabel').textContent = i18n[currentLang].stores_label;

    const result = document.getElementById('aiResult');
    result.classList.add('show');
    result.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
});

// ── SETTINGS ──────────────────────────────────────────
window.toggleSettings = () => {
    const d = document.getElementById('settingsDrawer');
    const open = d.classList.toggle('open');
    document.getElementById('menuOverlay').style.display = open ? 'block' : 'none';
};
window.toggleDarkMode = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
};
window.changeProfile = () => { localStorage.removeItem('perfilActivoId'); window.location.href = 'profiles.html'; };
window.doLogout = () => signOut(auth).then(() => window.location.replace('login.html'));
window.doChangeEmail = async () => {
    if (!currentUser) return;
    const e = prompt('Nuevo correo:');
    if (e) { try { await verifyBeforeUpdateEmail(currentUser, e); alert('Verificación enviada.'); } catch(er) { alert(er.message); } }
};
window.doChangePassword = async () => {
    if (!currentUser) return;
    try { await sendPasswordResetEmail(auth, currentUser.email); alert('Correo de recuperación enviado.'); } catch(er) { alert(er.message); }
};
window.doDeleteAccount = async () => {
    if (!confirm('¿Eliminar cuenta permanentemente?')) return;
    try { await deleteDoc(doc(db, 'usuarios', currentUser.uid)); await deleteUser(currentUser); window.location.replace('login.html'); } catch(e) { alert('Reautenticación requerida.'); }
};

// ── AUTH ──────────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.replace('login.html'); return; }
    currentUser = user;
    const perfilNombre = localStorage.getItem('perfilActivoNombre');
    document.getElementById('userEmail').innerText = perfilNombre || user.email;
    const img = perfilFoto || user.photoURL;
    if (img) {
        const btn = document.getElementById('btnSettings');
        btn.style.backgroundImage = `url(${img})`;
        btn.innerText = '';
    } else {
        document.getElementById('btnSettings').innerText = '👤';
    }
});
</script>
