    'apple':'#555555','nike':'#111111','adidas':'#000000',
    'macys':'#E21A1A','nordstrom':'#1A1A1A','newegg':'#FF6600',
    'ross':'#CC0000','tjmaxx':'#C8102E','marshalls':'#007A3D',
    'dollartree':'#00843D','dollargeneral':'#FFCC00','samsung':'#1428A0',
    'microsoft':'#00A4EF','gamestop':'#E31937',
};

function getStoreEmoji(domain) {
    const d = (domain||'').toLowerCase().replace('www.','').replace('.com','');
    for (const k of Object.keys(STORE_EMOJIS)) {
        if (d.includes(k.replace(' ',''))) return STORE_EMOJIS[k];
    }
    return STORE_EMOJIS['default'];
}

function getStoreName(displayLink) {
    const d = (displayLink||'').replace('www.','');
    return STORE_NAMES[d] || d.split('.')[0].charAt(0).toUpperCase() + d.split('.')[0].slice(1);
}

function getStoreColor(domain) {
    const d = (domain||'').toLowerCase().replace('www.','').replace('.com','');
    for (const k of Object.keys(STORE_COLORS)) {
        if (d.includes(k)) return STORE_COLORS[k];
    }
    return '#2563eb';
}

function extractPrice(snippet, title) {
    const text = (snippet||'') + ' ' + (title||'');
    const m = text.match(/\$\s*[\d,]+\.?\d{0,2}/);
    if (m) return m[0].replace(/\s/,'');
    return null;
}

// ── CATEGORÍA ─────────────────────────────────────────
let currentCat = 'general';
window.selectCat = (el) => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentCat = el.dataset.cat;
};

// ── LOADING ───────────────────────────────────────────
let loadingInterval = null;
function startLoading() {
    document.getElementById('btnBuscar').disabled = true;
    document.getElementById('loadingBox').classList.add('show');
    document.getElementById('aiResult').classList.remove('show');
    const msgs = [i18n[currentLang].loading_1, i18n[currentLang].loading_2, i18n[currentLang].loading_3];
    let i = 0;
    document.getElementById('loadingText').textContent = msgs[0];
    loadingInterval = setInterval(() => { i=(i+1)%msgs.length; document.getElementById('loadingText').textContent = msgs[i]; }, 1800);
}
function stopLoading() {
    clearInterval(loadingInterval);
    document.getElementById('loadingBox').classList.remove('show');
    document.getElementById('btnBuscar').disabled = false;
}

// ── BUSCAR ────────────────────────────────────────────
window.buscar = async () => {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) {
        alert(currentLang === 'es' ? 'Escribí el nombre del producto.' : 'Type a product name.');
        return;
    }
    startLoading();

    const catQuery = {
        general: `${query} price buy`,
        tech:    `${query} price buy site:bestbuy.com OR site:amazon.com OR site:newegg.com OR site:apple.com`,
        ropa:    `${query} price buy site:nike.com OR site:adidas.com OR site:macys.com OR site:zappos.com OR site:amazon.com`
    };

    const url = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX}&q=${encodeURIComponent(catQuery[currentCat])}&num=10`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        stopLoading();
        if (data.error) throw new Error(data.error.message);
        renderResultados(query, data.items || []);
    } catch (err) {
        stopLoading();
        alert(err.message || i18n[currentLang].error_search);
    }
};

// ── RENDER ────────────────────────────────────────────
function renderResultados(query, items) {
    const grid = document.getElementById('storesGrid');
    grid.innerHTML = '';

    if (!items.length) {
        grid.innerHTML = `<div class="no-results">${i18n[currentLang].no_results}</div>`;
        document.getElementById('resultsCount').textContent = '';
        document.getElementById('aiResult').classList.add('show');
        return;
    }

    items.forEach(item => {
        const storeName  = getStoreName(item.displayLink);
        const emoji      = getStoreEmoji(item.displayLink);
        const color      = getStoreColor(item.displayLink);
        const price      = extractPrice(item.snippet, item.title);

        const card = document.createElement('a');
        card.href = item.link;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.className = 'product-card';
        card.innerHTML = `
            <div class="product-top">
                <div class="store-logo" style="background:${color}22;">${emoji}</div>
                <span class="store-name-badge">${storeName}</span>
            </div>
            <div class="product-title">${item.title}</div>
            <div class="product-bottom">
                <span class="product-price">${price || '—'}</span>
                <span class="product-link-label">${i18n[currentLang].ver_tienda}</span>
            </div>
        `;
        grid.appendChild(card);
    });

    document.getElementById('tipText').textContent = i18n[currentLang]['tip_' + currentCat];
    document.getElementById('resultsCount').textContent = `${items.length} resultados — "${query.toUpperCase()}"`;
    const result = document.getElementById('aiResult');
    result.classList.add('show');
    result.scrollIntoView({ behavior:'smooth', block:'start' });
}

document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
});

// ── SETTINGS ──────────────────────────────────────────
window.toggleSettings = () => {
    const d = document.getElementById('settingsDrawer');
    const open = d.classList.toggle('open');
    document.getElementById('menuOverlay').style.display = open ? 'block' : 'none';
};
window.toggleDarkMode = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
};
window.changeProfile = () => { localStorage.removeItem('perfilActivoId'); window.location.href = 'profiles.html'; };
window.doLogout = () => signOut(auth).then(() => window.location.replace('login.html'));
window.doChangeEmail = async () => {
    if (!currentUser) return;
    const e = prompt('Nuevo correo:');
    if (e) { try { await verifyBeforeUpdateEmail(currentUser, e); alert('Verificación enviada.'); } catch(er) { alert(er.message); } }
};
window.doChangePassword = async () => {
    if (!currentUser) return;
    try { await sendPasswordResetEmail(auth, currentUser.email); alert('Correo de recuperación enviado.'); } catch(er) { alert(er.message); }
};
window.doDeleteAccount = async () => {
    if (!confirm('¿Eliminar cuenta permanentemente?')) return;
    try { await deleteDoc(doc(db, 'usuarios', currentUser.uid)); await deleteUser(currentUser); window.location.replace('login.html'); } catch(e) { alert('Reautenticación requerida.'); }
};

// ── AUTH ──────────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.replace('login.html'); return; }
    currentUser = user;
    const perfilNombre = localStorage.getItem('perfilActivoNombre');
    document.getElementById('userEmail').innerText = perfilNombre || user.email;
    const img = perfilFoto || user.photoURL;
    if (img) {
        const btn = document.getElementById('btnSettings');
        btn.style.backgroundImage = `url(${img})`;
        btn.innerText = '';
    } else {
        document.getElementById('btnSettings').innerText = '👤';
    }
});
</script>
